# Post-Training Benchmark Preset
# 训练后模型权重对比的标准化评估配置。
#
# 用法:
#   python3 scripts/analysis/run_benchmark.py                          # 默认 preset + 默认模型
#   python3 scripts/analysis/run_benchmark.py --models v3c exp004      # 指定模型对比
#   python3 scripts/analysis/run_benchmark.py --suite cape_town_t1_smoke  # 只跑 smoke

benchmark_id: "post_train"
description: "Post-training model weight comparison benchmark"
postproc_config: "configs/postproc/batch003_best_f1.json"

# 默认行为 (零参数启动)
default_models: ["v3c"]
baseline_model: "v3c"

# 统一推理参数
default_args:
  evaluation_profile: "installation"
  chip_size: 400
  overlap: 0.25
  confidence_threshold: 0.3
  mask_threshold: 0.3

# ── Suites ──────────────────────────────────────────────────────────
suites:
  - suite_id: cape_town_t1_smoke
    role: smoke
    data_scope: full_grid
    leakage_risk: low
    notes: "快速回归检测，3 个早期 T1 grid"
    grid_ids:
      - G1189
      - G1190
      - G1238

  - suite_id: cape_town_independent_26
    role: primary
    data_scope: full_grid
    leakage_risk: low
    notes: "主排名集，26 个独立 grid (batch 001+002)，不参与 V3 训练"
    grid_ids:
      - G1240
      - G1243
      - G1244
