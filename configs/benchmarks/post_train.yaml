  - suite_id: jhb_transfer_6
    role: secondary
    data_scope: cross_city
    leakage_risk: low
    notes: "跨城市泛化测试 (Johannesburg)"
    grid_ids:
      - JHB01
      - JHB02
      - JHB03
      - JHB04
      - JHB05
      - JHB06

# ── Verdict 自动判定规则 ──────────────────────────────────────────
verdict_rules:
  improved_threshold: 0.005     # delta_f1 >= +0.005 → improved
  regressed_threshold: -0.005   # delta_f1 <= -0.005 → regressed
  mixed_drop_threshold: 0.02    # F1 提升但 P 或 R 任一下降 > 0.02 → mixed
